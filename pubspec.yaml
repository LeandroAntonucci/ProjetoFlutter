name: lavie
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  provider: ^6.0.5
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

fonts:
  - family: MontserratAlternates
    fonts:
      - asset: assets/fonts/MontserratAlternates-Regular.ttf
      - asset: assets/fonts/MontserratAlternates-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/MontserratAlternates-Medium.ttf
        weight: 500
